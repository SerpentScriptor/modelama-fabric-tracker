<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --navy:#122142;
    --navy-2:#1b2f57;
    --navy-3:#24406f;
    --orange:#e8833a;
    --orange-2:#f3a35e;
    --bg:#eef1f7;
    --card:#ffffff;
    --border:#e2e6ef;
    --text:#1c2536;
    --muted:#6b7488;
    --danger:#e5484d;
    --danger-bg:#fde9e9;
    --warning:#f0a83b;
    --warning-bg:#fdf1de;
    --success:#2fa365;
    --success-bg:#e4f6ec;
    --info:#3465c9;
    --info-bg:#e7edfb;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body,html{margin:0;padding:0;}
  #modelama-root{
    font-family:Calibri,'Segoe UI',Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    width:100%;
  }
  #modelama-root button{font-family:inherit;cursor:pointer;}
  #modelama-root input,#modelama-root select,#modelama-root textarea{font-family:inherit;}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 20% 20%, var(--navy-3), var(--navy) 60%);
    padding:24px;
  }
  .login-card{
    background:var(--card);width:100%;max-width:420px;border-radius:16px;
    padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .login-tag{
    display:inline-block;background:var(--orange);color:#fff;font-size:11px;font-weight:700;
    letter-spacing:.08em;padding:4px 10px;border-radius:20px;margin-bottom:14px;
  }
  .login-card h1{font-size:22px;margin:0 0 4px;color:var(--navy);}
  .login-card p{color:var(--muted);margin:0 0 22px;font-size:13.5px;}
  .login-card label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin:14px 0 6px;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .role-btn{
    border:1.5px solid var(--border);background:#fafbfd;border-radius:8px;padding:10px 8px;
    font-size:12.5px;font-weight:600;color:var(--text);text-align:left;transition:.15s;
  }
  .role-btn:hover{border-color:var(--orange-2);background:#fff6ee;}
  .role-btn.active{border-color:var(--orange);background:var(--orange);color:#fff;}
  .role-btn .sub{display:block;font-weight:400;font-size:10.5px;opacity:.75;margin-top:2px;}
  .login-name{
    width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;
  }
  .login-submit{
    margin-top:20px;width:100%;padding:12px;border:none;border-radius:8px;background:var(--navy);
    color:#fff;font-weight:700;font-size:14px;
  }
  .login-submit:disabled{opacity:.5;cursor:not-allowed;}
  .login-submit:hover:not(:disabled){background:var(--navy-3);}

  /* ---------- SHELL ---------- */
  .shell{display:flex;min-height:100vh;}
  .sidebar{
    width:220px;background:var(--navy);color:#cdd6ea;flex-shrink:0;
    display:flex;flex-direction:column;padding:18px 0;
  }
  .brand{padding:0 18px 16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:10px;}
  .brand .tag{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;letter-spacing:.06em;}
  .brand h2{font-size:15px;margin:8px 0 0;color:#fff;line-height:1.3;}
  .brand small{color:#9fb0d4;font-size:10.5px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:600;
    color:#c3cde5;border-left:3px solid transparent;
  }
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;cursor:pointer;}
  .nav-item.active{background:rgba(232,131,58,.16);border-left-color:var(--orange);color:#fff;}
  .nav-icon{width:18px;text-align:center;}
  .nav-section{padding:14px 18px 4px;font-size:10px;letter-spacing:.08em;color:#7688ab;font-weight:700;}
  .sidebar-footer{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);}
  .sidebar-footer .who{font-size:12px;color:#fff;font-weight:700;}
  .sidebar-footer .role{font-size:11px;color:#9fb0d4;margin-bottom:8px;}
  .logout-btn{background:none;border:1px solid rgba(255,255,255,.25);color:#e5ebf7;font-size:11.5px;
    padding:6px 10px;border-radius:6px;width:100%;}
  .logout-btn:hover{background:rgba(255,255,255,.1);}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{
    background:#fff;border-bottom:1px solid var(--border);padding:14px 26px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .topbar h1{font-size:18px;margin:0;color:var(--navy);}
  .topbar .breadcrumb{font-size:11.5px;color:var(--muted);margin-top:2px;}
  .search-mini{
    display:flex;align-items:center;gap:8px;background:#f3f5fa;border:1px solid var(--border);
    border-radius:8px;padding:7px 12px;min-width:260px;
  }
  .search-mini input{border:none;background:none;outline:none;font-size:13px;flex:1;}
  .content{padding:22px 26px 40px;overflow-y:auto;}

  /* ---------- COMMON WIDGETS ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px;}
  @media (max-width:1200px){.stat-grid{grid-template-columns:repeat(3,1fr);}}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;border:1px solid var(--border);}
  .stat-card .num{font-size:24px;font-weight:800;color:var(--navy);}
  .stat-card .lbl{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px;}
  .stat-card.orange{background:linear-gradient(135deg,#fff3e8,#fff);}
  .stat-card.red{background:linear-gradient(135deg,#fdecec,#fff);}
  .stat-card.green{background:linear-gradient(135deg,#e6f7ee,#fff);}
  .stat-card.blue{background:linear-gradient(135deg,#eaf1fd,#fff);}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:18px;}
  .panel h3{margin:0 0 14px;font-size:14.5px;color:var(--navy);display:flex;align-items:center;justify-content:space-between;}
  .panel h3 .hint{font-size:11px;color:var(--muted);font-weight:400;}

  table.data{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.data th{text-align:left;color:var(--muted);font-weight:700;font-size:10.8px;letter-spacing:.03em;
    text-transform:uppercase;border-bottom:1px solid var(--border);padding:8px 10px;background:#fafbfd;}
  table.data td{padding:9px 10px;border-bottom:1px solid #f0f2f7;vertical-align:middle;}
  table.data tr:hover td{background:#fbfcfe;}
  .row-click{cursor:pointer;}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;}
  .badge.HIGH{background:var(--danger-bg);color:var(--danger);}
  .badge.MEDIUM{background:var(--warning-bg);color:#a6690c;}
  .badge.LOW{background:var(--success-bg);color:var(--success);}
  .badge.status-inprogress{background:var(--info-bg);color:var(--info);}
  .badge.status-ready{background:var(--success-bg);color:var(--success);}
  .badge.status-issued{background:#eee;color:#555;}
  .badge.status-delayed{background:var(--danger-bg);color:var(--danger);}

  .progress-bar{width:110px;height:7px;background:#eef0f5;border-radius:6px;overflow:hidden;display:inline-block;vertical-align:middle;}
  .progress-bar > div{height:100%;background:var(--orange);}
  .progress-txt{font-size:11px;color:var(--muted);margin-left:6px;}

  .btn{border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:700;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-3);}
  .btn-orange{background:var(--orange);color:#fff;}
  .btn-orange:hover{background:#d4712a;}
  .btn-outline{background:#fff;border:1.4px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--navy-3);}
  .btn-success{background:var(--success);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:5px 10px;font-size:11.5px;}
  .btn[disabled]{opacity:.45;cursor:not-allowed;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
  .form-field label{display:block;font-size:11.5px;font-weight:700;color:var(--navy);margin-bottom:5px;}
  .form-field input,.form-field select,.form-field textarea{
    width:100%;padding:9px 10px;border:1.4px solid var(--border);border-radius:7px;font-size:13px;background:#fff;
  }
  .form-field textarea{resize:vertical;min-height:60px;}
  .form-field.full{grid-column:1/-1;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .big{font-size:36px;margin-bottom:8px;}

  /* modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(10,16,30,.55);display:flex;align-items:flex-start;
    justify-content:center;padding:30px 16px;z-index:1000;overflow-y:auto;
  }
  .modal-box{background:#fff;border-radius:14px;max-width:820px;width:100%;padding:0;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.4);}
  .modal-head{background:var(--navy);color:#fff;padding:18px 24px;display:flex;justify-content:space-between;align-items:flex-start;}
  .modal-head h2{margin:0;font-size:17px;}
  .modal-head .sub{font-size:11.5px;color:#a9b8db;margin-top:3px;}
  .modal-close{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:6px;width:28px;height:28px;font-size:15px;}
  .modal-body{padding:22px 24px;max-height:75vh;overflow-y:auto;}

  .timeline{list-style:none;margin:0;padding:0;}
  .timeline li{display:flex;gap:12px;padding-bottom:18px;position:relative;}
  .timeline li:not(:last-child)::before{content:'';position:absolute;left:9px;top:22px;bottom:-2px;width:2px;background:var(--border);}
  .tl-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;z-index:1;}
  .tl-dot.done{background:var(--success);}
  .tl-dot.active{background:var(--orange);}
  .tl-dot.upcoming{background:#cfd6e4;}
  .tl-content .stage{font-size:13px;font-weight:700;color:var(--navy);}
  .tl-content .meta{font-size:11px;color:var(--muted);}

  .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 18px;margin-bottom:18px;}
  .info-item .k{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;font-weight:700;}
  .info-item .v{font-size:13.5px;font-weight:600;color:var(--text);margin-top:2px;}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .tab-btn{padding:9px 14px;font-size:12.5px;font-weight:700;color:var(--muted);border:none;background:none;border-bottom:2.5px solid transparent;}
  .tab-btn.active{color:var(--navy);border-bottom-color:var(--orange);}

  .alert-card{border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid;}
  .alert-card.danger{background:var(--danger-bg);border-color:#f5c2c3;}
  .alert-card.warning{background:var(--warning-bg);border-color:#f3d9a4;}
  .alert-card.info{background:var(--info-bg);border-color:#c3d3f5;}
  .alert-card .title{font-weight:800;font-size:12.5px;margin-bottom:4px;}
  .alert-card .body{font-size:12px;color:#374057;line-height:1.6;}

  .qr-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
  .qr-box .sid{font-family:'Courier New',monospace;font-weight:800;font-size:13px;margin-top:8px;color:var(--navy);}

  .toast{
    position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 18px;
    border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.3);z-index:1200;
    animation:toastIn .2s ease;
  }
  @keyframes toastIn{from{transform:translateY(10px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .pill-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .pill{padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:700;background:#fff;color:var(--muted);}
  .pill.active{background:var(--navy);border-color:var(--navy);color:#fff;}

  .loading{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#fff;background:var(--navy);font-size:14px;}
</style>

<div id="modelama-root">
  <div class="loading" id="mm-loading">Loading Modelama Fabric Tracker…</div>
</div>

<script>
(function(){
  "use strict";

  /* ============ CONSTANTS ============ */
  const STAGES = [
    "Shipment Received","GRN Generated","Lab Shrinkage","Shade Lotting",
    "Bulk Shrinkage","Merchant Approval","Fabric Inspection","Ready for Issue","Issued to Production"
  ];
  const ROLES = [
    {key:"Admin", sub:"Complete control"},
    {key:"Store/GRN", sub:"Receive shipment, GRN"},
    {key:"Lab", sub:"Shrinkage & tests"},
    {key:"QA", sub:"Fabric inspection"},
    {key:"Merchandiser", sub:"Buyer approval"},
    {key:"Planning", sub:"View status / reports"},
    {key:"Production", sub:"Issue fabric"}
  ];
  const ROLE_NAV = {
    "Admin": ["dashboard","new-shipment","grn","lab","shade","bulk","merchant","inspection","issue","alerts","reports","search","admin"],
    "Store/GRN": ["dashboard","new-shipment","grn","alerts","search"],
    "Lab": ["dashboard","lab","shade","bulk","alerts","search"],
    "QA": ["dashboard","inspection","alerts","search"],
    "Merchandiser": ["dashboard","new-shipment","merchant","alerts","search"],
    "Planning": ["dashboard","alerts","reports","search"],
    "Production": ["dashboard","issue","alerts","search"]
  };
  const NAV_META = {
    "dashboard":{icon:"&#9635;",label:"Dashboard"},
    "new-shipment":{icon:"&#128666;",label:"New Shipment"},
    "grn":{icon:"&#128230;",label:"GRN / Scan QR"},
    "lab":{icon:"&#129514;",label:"Lab Shrinkage"},
    "shade":{icon:"&#127912;",label:"Shade Lotting"},
    "bulk":{icon:"&#128202;",label:"Bulk Shrinkage"},
    "merchant":{icon:"&#9989;",label:"Merchant Approval"},
    "inspection":{icon:"&#128269;",label:"Fabric Inspection"},
    "issue":{icon:"&#9986;",label:"Issue to Production"},
    "alerts":{icon:"&#128276;",label:"Alerts"},
    "reports":{icon:"&#128196;",label:"Reports"},
    "search":{icon:"&#128270;",label:"Search"},
    "admin":{icon:"&#9881;",label:"Admin Tools"}
  };
  const LAB_THRESHOLD_HRS = 24;
  const MERCHANT_THRESHOLD_HRS = 48;

  /* ============ STATE ============ */
  let db = { shipments: [], counters: { shipmentSeq: 0, grnSeq: 0 } };
  let session = null; // {role, name}
  let view = "dashboard";
  let selectedId = null;
  let searchTerm = "";
  let dashboardFilter = "all";

  // If this page was opened via a QR scan (URL like /scan/SHP-2026-000145),
  // remember which shipment to jump straight to once logged in.
  const scanMatch = window.location.pathname.match(/^\/scan\/([^\/?#]+)/);
  let pendingScanShipmentId = scanMatch ? decodeURIComponent(scanMatch[1]) : null;

  const root = document.getElementById("modelama-root");

  /* ============ STORAGE — real backend (Express + PostgreSQL) ============ */
  let APP_KEY = localStorage.getItem("mm_app_key") || "";

  async function apiFetch(url, opts){
    opts = opts || {};
    opts.headers = Object.assign({ "Content-Type": "application/json", "x-app-key": APP_KEY }, opts.headers||{});
    const res = await fetch(url, opts);
    if(res.status === 401){ const e = new Error("UNAUTHORIZED"); e.code = 401; throw e; }
    if(!res.ok){ throw new Error("Request failed: " + res.status); }
    const ct = res.headers.get("content-type") || "";
    return ct.includes("application/json") ? res.json() : res.text();
  }

  async function loadDB(){
    const [shipments, counters] = await Promise.all([
      apiFetch("/api/shipments"),
      apiFetch("/api/counters")
    ]);
    db.shipments = shipments;
    db.counters = counters;
  }
  async function saveDB(){
    try{
      await apiFetch("/api/sync", { method: "POST", body: JSON.stringify({ shipments: db.shipments, counters: db.counters }) });
    }catch(e){
      console.error("sync failed", e);
      toast("⚠ Could not save to the server — check your connection.");
    }
  }

  /* ============ HELPERS ============ */
  function uid(){ return Math.random().toString(36).slice(2,9); }
  function now(){ return Date.now(); }
  function fmtDate(ts){
    if(!ts) return "—";
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ", " +
           d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }
  function hoursSince(ts){ return (now()-ts)/36e5; }
  function daysSince(ts){ return (now()-ts)/864e5; }
  function toast(msg){
    const t = document.createElement("div");
    t.className = "toast"; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 2600);
  }
  function esc(s){ return (s===undefined||s===null) ? "" : String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function nextShipmentId(){
    db.counters.shipmentSeq += 1;
    const year = new Date().getFullYear();
    return "SHP-" + year + "-" + String(db.counters.shipmentSeq).padStart(6,"0");
  }
  function nextGRN(){
    db.counters.grnSeq += 1;
    const year = new Date().getFullYear();
    return "GRN-" + year + "-" + String(db.counters.grnSeq).padStart(6,"0");
  }

  function getShipment(id){ return db.shipments.find(s=>s.id===id); }

  function stageIndex(name){ return STAGES.indexOf(name); }

  function currentStageStatus(sh){
    // returns 'ok' | 'lab-late' | 'merchant-late' | 'issued'
    if(sh.currentStage === "Issued to Production") return "issued";
    if(sh.currentStage === "Lab Shrinkage" && hoursSince(sh.stageEnteredAt) > LAB_THRESHOLD_HRS) return "lab-late";
    if(sh.currentStage === "Merchant Approval" && hoursSince(sh.stageEnteredAt) > MERCHANT_THRESHOLD_HRS) return "merchant-late";
    return "ok";
  }

  function progressPct(sh){
    const idx = stageIndex(sh.currentStage);
    return Math.round(((idx+1)/STAGES.length)*100);
  }

  function statusLabel(sh){
    if(sh.currentStage === "Issued to Production") return {text:"Issued", cls:"status-issued"};
    if(sh.currentStage === "Ready for Issue") return {text:"Ready", cls:"status-ready"};
    if(currentStageStatus(sh) !== "ok") return {text:"Delayed", cls:"status-delayed"};
    return {text:"In Progress", cls:"status-inprogress"};
  }

  function pushTimeline(sh, stage, personRole, remarks){
    sh.timeline.push({ stage, person: personRole, ts: now(), remarks: remarks||"" });
  }

  function moveToStage(sh, stageName, personRole, remarks){
    pushTimeline(sh, sh.currentStage + " completed", personRole, remarks);
    sh.currentStage = stageName;
    sh.stageEnteredAt = now();
    if(stageName === "Ready for Issue"){
      // auto-advance instantly, log it, then go to issued-pending
      pushTimeline(sh, "Ready for Issue", "System", "All departments cleared. Auto-marked ready.");
    }
  }

  /* ============ SEED (optional demo data on very first run) ============ */
  function seedIfEmpty(){
    if(db.shipments.length > 0) return;
    const seedRows = [
      ["INV-2025-0001","ST-101","ZARA","ABC TEXTILES","COTTON JERSEY","BLACK",5000,25,"HIGH","Bulk Shrinkage"],
      ["INV-2025-0002","ST-102","CK","XYZ MILLS","POLY VISCOSE","NAVY",3200,18,"HIGH","Merchant Approval"],
      ["INV-2025-0003","ST-103","VF CORP","ABC TEXTILES","RIB KNIT","WHITE",4000,22,"MEDIUM","Lab Shrinkage"],
      ["INV-2025-0004","ST-104","MACY'S","GLOBAL FAB","TWILL","OLIVE",2500,14,"LOW","Ready for Issue"],
      ["INV-2025-0005","ST-105","NPG","ABC TEXTILES","INTERLOCK","GREY MELANGE",3800,20,"HIGH","Fabric Inspection"]
    ];
    seedRows.forEach(r=>{
      const sh = makeShipment({
        invoice:r[0], po:"PO-"+r[1], style:r[1], buyer:r[2], supplier:r[3],
        fabric:r[4], color:r[5], gsm:"180", rolls:r[7], qty:r[6],
        vehicleNo:"DL-01-AB-1234", driverName:"Ramesh Kumar", priority:r[8]
      }, "Store/GRN", true);
      sh.isSeed = true;
      // fast-forward to target stage for demo realism
      const target = r[9];
      const order = STAGES;
      let i = stageIndex(sh.currentStage);
      const targetIdx = stageIndex(target);
      while(i < targetIdx){
        i++;
        sh.currentStage = order[i];
        sh.stageEnteredAt = now() - (targetIdx-i+1)*3600*1000;
        pushTimeline(sh, order[i-1]+" completed", "System (seed)", "");
      }
      db.shipments.push(sh);
    });
  }

  function makeShipment(fields, role, skipPush){
    const id = uid();
    const shipmentId = nextShipmentId();
    const sh = {
      id, shipmentId,
      invoice: fields.invoice, po: fields.po, style: fields.style, buyer: fields.buyer,
      supplier: fields.supplier, fabric: fields.fabric, gsm: fields.gsm, color: fields.color,
      rolls: Number(fields.rolls)||0, qty: Number(fields.qty)||0,
      vehicleNo: fields.vehicleNo, driverName: fields.driverName,
      arrivalDate: now(), priority: fields.priority || "MEDIUM",
      grnNo: null,
      currentStage: "Shipment Received",
      stageEnteredAt: now(),
      timeline: [],
      lab: null, shade: null, bulk: {ten:null, hundred:null}, merchant: null, inspection: null,
      issuedQty: null, issuedAt: null
    };
    pushTimeline(sh, "Shipment Received", role, "New shipment registered at gate.");
    if(!skipPush) db.shipments.push(sh);
    return sh;
  }

  /* ============ DASHBOARD ============ */
  function viewDashboard(){
    const all = db.shipments;
    const total = all.length;
    const urgent = all.filter(s=>s.priority==="HIGH" && s.currentStage!=="Issued to Production").length;
    const inProgress = all.filter(s=>!["Ready for Issue","Issued to Production"].includes(s.currentStage)).length;
    const ready = all.filter(s=>s.currentStage==="Ready for Issue").length;
    const delayed = all.filter(s=>currentStageStatus(s)!=="ok").length;
    const issued = all.filter(s=>s.currentStage==="Issued to Production" && s.issuedAt);
    let avgLead = "—";
    if(issued.length){
      const avgDays = issued.reduce((sum,s)=>sum+((s.issuedAt-s.arrivalDate)/864e5),0)/issued.length;
      avgLead = avgDays.toFixed(1) + " d";
    }

    const stageCounts = STAGES.map(st=>({st, n: all.filter(s=>s.currentStage===st).length}));

    let filtered = all;
    if(dashboardFilter==="urgent") filtered = all.filter(s=>s.priority==="HIGH" && s.currentStage!=="Issued to Production");
    if(dashboardFilter==="delayed") filtered = all.filter(s=>currentStageStatus(s)!=="ok");
    if(dashboardFilter==="ready") filtered = all.filter(s=>s.currentStage==="Ready for Issue");

    return `
      <div class="stat-grid">
        <div class="stat-card blue"><div class="num">${total}</div><div class="lbl">Total Shipments</div></div>
        <div class="stat-card red"><div class="num">${urgent}</div><div class="lbl">Urgent (High Priority)</div></div>
        <div class="stat-card orange"><div class="num">${inProgress}</div><div class="lbl">In Progress</div></div>
        <div class="stat-card green"><div class="num">${ready}</div><div class="lbl">Ready for Issue</div></div>
        <div class="stat-card red"><div class="num">${delayed}</div><div class="lbl">Delayed Shipments</div></div>
        <div class="stat-card blue"><div class="num">${avgLead}</div><div class="lbl">Avg Lead Time</div></div>
      </div>

      <div class="panel">
        <h3>Stage-wise Summary <span class="hint">click a stage to filter table</span></h3>
        <div class="pill-select">
          <span class="pill ${dashboardFilter==='all'?'active':''}" data-f="all">All (${total})</span>
          <span class="pill ${dashboardFilter==='urgent'?'active':''}" data-f="urgent">Urgent (${urgent})</span>
          <span class="pill ${dashboardFilter==='delayed'?'active':''}" data-f="delayed">Delayed (${delayed})</span>
          <span class="pill ${dashboardFilter==='ready'?'active':''}" data-f="ready">Ready (${ready})</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${stageCounts.map(sc=>`<div style="flex:1;min-width:110px;background:#fafbfd;border:1px solid var(--border);border-radius:8px;padding:8px 10px;">
            <div style="font-size:18px;font-weight:800;color:var(--navy);">${sc.n}</div>
            <div style="font-size:10.5px;color:var(--muted);font-weight:600;">${esc(sc.st)}</div>
          </div>`).join("")}
        </div>
      </div>

      <div class="panel">
        <h3>Shipments</h3>
        ${renderShipmentTable(filtered)}
      </div>
    `;
  }

    document.querySelectorAll(".pill[data-f]").forEach(p=>{

  /* ============ GRN / SCAN ============ */

    return `
    <div class="panel">

    </div>
    <div class="panel">
      <h3>Recently Generated GRNs</h3>
      ${done.length ? `<table class="data"><thead><tr><th>GRN No</th><th>Shipment ID</th><th>Receiver</th><th>Date</th></tr></thead>
      <tbody>${done.map(s=>`<tr><td><strong>${esc(s.grnNo)}</strong></td><td>${esc(s.shipmentId)}</td><td>${esc(s.grnReceiver||'—')}</td><td>${fmtDate(s.grnDate)}</td></tr>`).join("")}</tbody></table>`

    </div>`;

  function bindGRN(){
    document.getElementById("mm-scan-btn").addEventListener("click", ()=>doScan(val("mm-scan-input")));
    document.querySelectorAll("[data-scan]").forEach(b=>{
      b.addEventListener("click", ()=>{
        const sh = getShipment(b.getAttribute("data-scan"));
        doScan(sh.shipmentId);
      });
    });

  async function generateGRNIfNeeded(sh){
    if(sh.grnNo){
      return { status: "exists", grnNo: sh.grnNo, date: sh.grnDate };
    }
    sh.grnNo = nextGRN();
    sh.grnDate = now();
    sh.grnReceiver = session.name;
    moveToStage(sh, "Lab Shrinkage", session.role, "GRN generated, forwarded to Lab.");
    await saveDB();
    return { status: "generated", grnNo: sh.grnNo, date: sh.grnDate };
  }
  async function doScan(code){
    const box = document.getElementById("mm-scan-result");
    const sh = db.shipments.find(s=>s.shipmentId === code.trim());
    if(!sh){
      box.innerHTML = `<div class="alert-card danger"><div class="title">Not found</div><div class="body">No shipment matches Shipment ID "${esc(code)}". Check the QR / ID and try again.</div></div>`;
      return;
    }
    const result = await generateGRNIfNeeded(sh);
    if(result.status === "exists"){
      box.innerHTML = `<div class="alert-card warning"><div class="title">GRN already generated.</div><div class="body">${esc(sh.shipmentId)} already has GRN <strong>${esc(sh.grnNo)}</strong>, generated ${fmtDate(sh.grnDate)}.</div></div>`;
      return;
    }
    toast("GRN " + sh.grnNo + " generated for " + sh.shipmentId);
    box.innerHTML = `<div class="alert-card info"><div class="title">GRN Generated Successfully</div>
      <div class="body">Shipment <strong>${esc(sh.shipmentId)}</strong> → GRN <strong>${esc(sh.grnNo)}</strong><br/>
      Receiver: ${esc(session.name)} · Location: Main Store · Time: ${fmtDate(sh.grnDate)}<br/>
      Shipment forwarded to <strong>Lab Shrinkage</strong> queue.</div></div>`;
    renderContentOnly();
  }

  /* ============ GENERIC QUEUE VIEWS (lab/shade/bulk/merchant/inspection/issue) ============ */
  function viewQueue(stageName, kind){
    const list = db.shipments.filter(s=>s.currentStage===stageName)
      .sort((a,b)=>{ const pw={HIGH:0,MEDIUM:1,LOW:2}; return pw[a.priority]-pw[b.priority]; });
    const titleHint = {
      lab:"Priority queue — enter shrinkage test results",
      shade:"Assign shade group & continuity card",
      bulk:"Record 10% and 100% bulk shrinkage results",
      merchant:"Awaiting buyer / merchandiser decision",
      inspection:"4-point fabric inspection before release",
      issue:"Cleared shipments — issue fabric to production"
    }[kind];
    if(!list.length){
      return `<div class="panel"><h3>${esc(stageName)} Queue <span class="hint">${esc(titleHint)}</span></h3>
      <div class="empty-state"><div class="big">&#10003;</div>Nothing pending in this queue right now.</div></div>`;
    }
    return `<div class="panel">
      <h3>${esc(stageName)} Queue (${list.length}) <span class="hint">${esc(titleHint)}</span></h3>
      <table class="data"><thead><tr><th>Priority</th><th>Shipment ID</th><th>Style</th><th>Buyer</th><th>Fabric</th><th>Qty</th><th>Waiting</th><th></th></tr></thead>
      <tbody>${list.map(s=>{
        const waitH = hoursSince(s.stageEnteredAt);
        const late = (kind==="lab" && waitH>LAB_THRESHOLD_HRS) || (kind==="merchant" && waitH>MERCHANT_THRESHOLD_HRS);
        return `<tr>
          <td><span class="badge ${s.priority}">${s.priority}</span></td>
          <td><strong>${esc(s.shipmentId)}</strong></td>
          <td>${esc(s.style)}</td><td>${esc(s.buyer)}</td><td>${esc(s.fabric)}</td>
          <td>${s.qty.toLocaleString()} m</td>
          <td style="color:${late?'var(--danger)':'var(--muted)'};font-weight:${late?'700':'400'};">${waitH.toFixed(1)} h${late?' ⚠':''}</td>
          <td><button class="btn btn-orange btn-sm" data-open="${s.id}">Process</button></td>
        </tr>`;
      }).join("")}</tbody></table>
    </div>`;
  }
  function bindQueue(kind){
    document.querySelectorAll("[data-open]").forEach(b=>{
      b.addEventListener("click", ()=> openShipmentModal(b.getAttribute("data-open"), kind));
    });
  }

            <div class="info-item"><div class="k">Fabric</div><div class="v">${esc(sh.fabric)} · GSM ${esc(sh.gsm)}</div></div>
            <div class="info-item"><div class="k">Color</div><div class="v">${esc(sh.color)}</div></div>
            <div class="info-item"><div class="k">Rolls / Qty</div><div class="v">${sh.rolls} rolls · ${sh.qty.toLocaleString()} m</div></div>
            <div class="info-item"><div class="k">GRN No</div><div class="v">${esc(sh.grnNo||'Pending')}</div></div>
            <div class="info-item"><div class="k">Arrival</div><div class="v">${fmtDate(sh.arrivalDate)}</div></div>
          </div>
          <div class="tabs">
            <button class="tab-btn active" data-tab="timeline">Timeline</button>
            <button class="tab-btn" data-tab="action">Action</button>
            <button class="tab-btn" data-tab="qr">QR Code</button>
          </div>

      </div>
    </div>`;
    document.getElementById("mm-close").addEventListener("click", closeModal);
    document.getElementById("mm-overlay").addEventListener("click",(e)=>{ if(e.target.id==="mm-overlay") closeModal(); });
    document.querySelectorAll(".tab-btn").forEach(t=>{
      t.addEventListener("click", ()=>{
        document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
        t.classList.add("active");
        renderTab(sh, t.getAttribute("data-tab"));
      });
    });
    renderTab(sh, actionTab && sh.currentStage!=="Issued to Production" ? "action" : "timeline");
    if(actionTab){
      document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
      document.querySelector('.tab-btn[data-tab="action"]').classList.add("active");

  function closeModal(){
    document.getElementById("mm-modal-slot").innerHTML = "";
    selectedId = null;
    renderContentOnly();
  }

  function renderTab(sh, tab){
    const body = document.getElementById("mm-tab-body");
    if(tab === "timeline"){
      body.innerHTML = `<ul class="timeline">${STAGES.map((st,idx)=>{
        const curIdx = stageIndex(sh.currentStage);
        let cls = idx<curIdx ? "done" : (idx===curIdx?"active":"upcoming");
        const entry = sh.timeline.slice().reverse().find(t=>t.stage.startsWith(st));
        return `<li><div class="tl-dot ${cls}">${cls==='done'?'✔':(idx+1)}</div>
          <div class="tl-content"><div class="stage">${esc(st)}</div>
          <div class="meta">${entry? (esc(entry.person)+' · '+fmtDate(entry.ts)) : (cls==='active' ? 'In progress since '+fmtDate(sh.stageEnteredAt) : 'Not started') }</div>
          ${entry && entry.remarks ? `<div class="meta">${esc(entry.remarks)}</div>`:''}
          </div></li>`;
      }).join("")}</ul>`;
      return;
    }
    if(tab === "qr"){
      body.innerHTML = `<div class="qr-box" style="max-width:220px;"><div id="mm-modal-qr"></div><div class="sid">${esc(sh.shipmentId)}</div></div>`;
      renderQR("mm-modal-qr", scanUrl(sh.shipmentId));
      return;
    }
    // action tab
    body.innerHTML = actionFormFor(sh);
    bindActionForm(sh);
  }

  function actionFormFor(sh){
    const stage = sh.currentStage;
    if(stage === "Shipment Received"){
      if(session.role!=="Store/GRN" && session.role!=="Admin"){
        return `<div class="alert-card info"><div class="title">Awaiting GRN</div><div class="body">This shipment is waiting at the gate. It needs to be scanned by <strong>Store/GRN</strong> to generate its GRN number.</div></div>`;
      }
      return `<div class="alert-card info" style="margin-bottom:14px;"><div class="title">Awaiting GRN</div><div class="body">Confirms receipt and generates the GRN number automatically — no manual entry.</div></div>
      <button class="btn btn-orange" id="a-generate-grn">Generate GRN Now</button>`;
    }
    if(stage === "Lab Shrinkage"){
      if(session.role!=="Lab" && session.role!=="Admin") return roleBlocked("Lab");
      return `<div class="form-grid">
        <div class="form-field"><label>Shrinkage %</label><input id="a-shrinkage" type="number" step="0.1"/></div>
        <div class="form-field"><label>Relaxation %</label><input id="a-relax" type="number" step="0.1"/></div>
        <div class="form-field"><label>Spirality</label><input id="a-spirality" type="text"/></div>
        <div class="form-field"><label>Width (inch)</label><input id="a-width" type="number" step="0.1"/></div>
        <div class="form-field full"><label>Remarks</label><textarea id="a-remarks" placeholder="Report notes…"></textarea></div>
      </div>
      <button class="btn btn-success" id="a-submit" style="margin-top:12px;">Complete Lab Shrinkage &amp; Send to Shade Lotting</button>`;
    }
    if(stage === "Shade Lotting"){
      if(session.role!=="Lab" && session.role!=="Admin") return roleBlocked("Lab");
      return `<div class="form-grid">
        <div class="form-field"><label>Shade Group</label><input id="a-shadegroup" placeholder="A / B / C"/></div>
        <div class="form-field"><label>Continuity Card</label><select id="a-cc"><option value="Done">Done</option><option value="Not Required">Not Required</option></select></div>
      </div>
      <button class="btn btn-success" id="a-submit" style="margin-top:12px;">Complete Shade Lotting &amp; Send to Bulk Shrinkage</button>`;
    }
    if(stage === "Bulk Shrinkage"){
      if(session.role!=="Lab" && session.role!=="Admin") return roleBlocked("Lab");
      return `<div class="form-grid">
        <div class="form-field"><label>10% Bulk Result</label><input id="a-b10" placeholder="Pass / Fail / value"/></div>
        <div class="form-field"><label>100% Bulk Result</label><input id="a-b100" placeholder="Pass / Fail / value"/></div>
      </div>
      <button class="btn btn-success" id="a-submit" style="margin-top:12px;">Complete Bulk Shrinkage &amp; Send to Merchant Approval</button>`;
    }
    if(stage === "Merchant Approval"){
      if(session.role!=="Merchandiser" && session.role!=="Admin") return roleBlocked("Merchandiser");
      return `<div class="form-field full"><label>Remarks</label><textarea id="a-remarks" placeholder="Approval notes for buyer…"></textarea></div>
      <div style="display:flex;gap:10px;margin-top:10px;">
        <button class="btn btn-success" id="a-approve">Approve &amp; Send to Fabric Inspection</button>
        <button class="btn btn-danger" id="a-reject">Reject</button>
        <button class="btn btn-outline" id="a-retest">Need Re-test</button>
      </div>`;
    }
    if(stage === "Fabric Inspection"){
      if(session.role!=="QA" && session.role!=="Admin") return roleBlocked("QA");
      return `<div class="form-grid">
        <div class="form-field"><label>Total Rolls Inspected</label><input id="a-totalrolls" type="number" value="${sh.rolls}"/></div>
        <div class="form-field"><label>Defect Points</label><input id="a-defects" type="number" value="0"/></div>
        <div class="form-field"><label>Grade</label><select id="a-grade"><option>A</option><option>B</option><option>C</option></select></div>
        <div class="form-field"><label>Result</label><select id="a-result"><option value="Pass">Pass</option><option value="Reject">Reject</option></select></div>
      </div>
      <button class="btn btn-success" id="a-submit" style="margin-top:12px;">Complete Inspection &amp; Mark Ready for Issue</button>`;
    }
    if(stage === "Ready for Issue"){
      if(session.role!=="Production" && session.role!=="Admin") return roleBlocked("Production");
      return `<div class="alert-card info" style="margin-bottom:14px;"><div class="title">Cleared by all departments</div><div class="body">Lab ✔ · Shade Lotting ✔ · Bulk Shrinkage ✔ · Merchant Approval ✔ · Fabric Inspection ✔</div></div>
      <div class="form-field"><label>Issue Quantity (meters, max ${sh.qty.toLocaleString()})</label><input id="a-issueqty" type="number" max="${sh.qty}" value="${sh.qty}"/></div>
      <button class="btn btn-orange" id="a-submit" style="margin-top:12px;">Scan QR &amp; Issue to Production</button>`;
    }
    if(stage === "Issued to Production"){
      return `<div class="alert-card info"><div class="title">Completed</div><div class="body">Issued ${sh.issuedQty ? sh.issuedQty.toLocaleString()+' m' : ''} to production on ${fmtDate(sh.issuedAt)}. Total lead time: <strong>${((sh.issuedAt-sh.arrivalDate)/864e5).toFixed(1)} days</strong>.</div></div>`;
    }
    return "";
  }
  function roleBlocked(role){
    return `<div class="alert-card warning"><div class="title">Restricted action</div><div class="body">Only <strong>${esc(role)}</strong> (or Admin) can complete this stage. You are logged in as ${esc(session.role)}.</div></div>`;
  }

  function bindActionForm(sh){
    const grnBtn = document.getElementById("a-generate-grn");
    if(grnBtn){
      grnBtn.addEventListener("click", async ()=>{
        const result = await generateGRNIfNeeded(sh);
        toast(result.status === "generated" ? ("GRN " + sh.grnNo + " generated — forwarded to Lab.") : ("GRN already exists: " + sh.grnNo));
        renderTab(sh, "timeline");
        document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
        const tlBtn = document.querySelector('.tab-btn[data-tab="timeline"]');
        if(tlBtn) tlBtn.classList.add("active");
      });
    }
    const submit = document.getElementById("a-submit");
    if(submit){
      submit.addEventListener("click", async ()=>{
        const stage = sh.currentStage;
        if(stage === "Lab Shrinkage"){
          sh.lab = { shrinkage: val("a-shrinkage"), relaxation: val("a-relax"), spirality: val("a-spirality"), width: val("a-width"), remarks: val("a-remarks") };
          moveToStage(sh, "Shade Lotting", session.role, "Lab shrinkage test completed.");
        } else if(stage === "Shade Lotting"){
          sh.shade = { shadeGroup: val("a-shadegroup"), continuityCard: val("a-cc") };
          moveToStage(sh, "Bulk Shrinkage", session.role, "Shade lotting completed.");
        } else if(stage === "Bulk Shrinkage"){
          sh.bulk = { ten: val("a-b10"), hundred: val("a-b100") };
          moveToStage(sh, "Merchant Approval", session.role, "Bulk shrinkage completed.");
        } else if(stage === "Fabric Inspection"){
          sh.inspection = { totalRolls: val("a-totalrolls"), defects: val("a-defects"), grade: val("a-grade"), result: val("a-result") };
          moveToStage(sh, "Ready for Issue", session.role, "4-point inspection: " + sh.inspection.result + ", grade " + sh.inspection.grade + ".");
        } else if(stage === "Ready for Issue"){
          const qty = Number(val("a-issueqty")) || sh.qty;
          sh.issuedQty = qty; sh.issuedAt = now();
          moveToStage(sh, "Issued to Production", session.role, "Issued " + qty.toLocaleString() + " m to cutting/production.");
        }
        await saveDB();
        toast("Stage updated for " + sh.shipmentId);
        renderTab(sh, "timeline");
        document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
        document.querySelector('.tab-btn[data-tab="timeline"]').classList.add("active");
      });
    }
    const approve = document.getElementById("a-approve");
    if(approve){
      approve.addEventListener("click", async ()=>{
        sh.merchant = { status:"Approved", remarks: val("a-remarks"), date: now() };
        moveToStage(sh, "Fabric Inspection", session.role, "Merchant approved.");
        await saveDB(); toast("Approved — sent to Fabric Inspection.");
        renderTab(sh,"timeline");
        document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
        document.querySelector('.tab-btn[data-tab="timeline"]').classList.add("active");
      });
    }
    const reject = document.getElementById("a-reject");
    if(reject){
      reject.addEventListener("click", async ()=>{
        sh.merchant = { status:"Rejected", remarks: val("a-remarks"), date: now() };
        pushTimeline(sh, "Merchant Approval — Rejected", session.role, val("a-remarks"));
        await saveDB(); toast("Marked as Rejected.");
        renderTab(sh,"timeline");
        document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
        document.querySelector('.tab-btn[data-tab="timeline"]').classList.add("active");
      });
    }
    const retest = document.getElementById("a-retest");
    if(retest){
      retest.addEventListener("click", async ()=>{
        sh.merchant = { status:"Needs Re-test", remarks: val("a-remarks"), date: now() };
        sh.currentStage = "Lab Shrinkage"; sh.stageEnteredAt = now();
        pushTimeline(sh, "Sent back for Re-test", session.role, val("a-remarks"));
        await saveDB(); toast("Sent back to Lab for re-test.");
        closeModal();
      });
    }
  }

  /* ============ ALERTS ============ */
  function viewAlerts(){
    const labLate = db.shipments.filter(s=>s.currentStage==="Lab Shrinkage" && hoursSince(s.stageEnteredAt)>LAB_THRESHOLD_HRS);
    const merchantLate = db.shipments.filter(s=>s.currentStage==="Merchant Approval" && hoursSince(s.stageEnteredAt)>MERCHANT_THRESHOLD_HRS);
    const urgent = db.shipments.filter(s=>s.priority==="HIGH" && s.currentStage!=="Issued to Production");
    const inspectionPending = db.shipments.filter(s=>s.currentStage==="Fabric Inspection");
    let html = "";
    merchantLate.forEach(s=>{
      html += `<div class="alert-card danger"><div class="title">⚠ DELAY ALERT — Merchant Approval</div>
        <div class="body">Shipment: <strong>${esc(s.shipmentId)}</strong> (Style ${esc(s.style)})<br/>
        Pending since: ${hoursSince(s.stageEnteredAt).toFixed(1)} hours (standard: ${MERCHANT_THRESHOLD_HRS}h)<br/>
        Action: Follow up with Merchandiser — escalate to Store Incharge if unresolved.</div></div>`;
    });
    labLate.forEach(s=>{
      html += `<div class="alert-card danger"><div class="title">⚠ DELAY ALERT — Lab Shrinkage</div>
        <div class="body">Shipment: <strong>${esc(s.shipmentId)}</strong> (Style ${esc(s.style)})<br/>
        Pending since: ${hoursSince(s.stageEnteredAt).toFixed(1)} hours (standard: ${LAB_THRESHOLD_HRS}h)<br/>
        Action: Escalate to Lab Incharge.</div></div>`;
    });
    urgent.forEach(s=>{
      html += `<div class="alert-card warning"><div class="title">URGENT STYLE — ${esc(s.buyer)}</div>
        <div class="body">Shipment: <strong>${esc(s.shipmentId)}</strong> (Style ${esc(s.style)}) — currently at ${esc(s.currentStage)}.<br/>
        Action: Prioritize testing &amp; approval.</div></div>`;
    });
    if(inspectionPending.length){
      html += `<div class="alert-card info"><div class="title">INFORMATION</div><div class="body">Fabric Inspection pending for ${inspectionPending.length} shipment(s).</div></div>`;
    }

    return `<div class="panel"><h3>Alerts &amp; Escalation Panel</h3>${html}</div>`;
  }

  /* ============ REPORTS ============ */
  function viewReports(){
    const all = db.shipments;
    const byBuyer = groupCount(all, s=>s.buyer);
    const bySupplier = groupCount(all, s=>s.supplier);
    const byStage = groupCount(all, s=>s.currentStage);
    return `
    <div class="panel">
      <h3>Reports <span class="hint">export full data as CSV (Excel-compatible)</span></h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" id="rep-all">Download Full Shipment Report (CSV)</button>
        <button class="btn btn-outline btn-sm" id="rep-delay">Download Delay Report (CSV)</button>
      </div>
    </div>
    <div class="panel">
      <h3>By Buyer</h3>${renderCountTable(byBuyer)}
    </div>
    <div class="panel">
      <h3>By Supplier</h3>${renderCountTable(bySupplier)}
    </div>
    <div class="panel">
      <h3>By Stage (Department view)</h3>${renderCountTable(byStage)}
    </div>`;
  }
  function groupCount(list, keyFn){
    const m = {};
    list.forEach(s=>{ const k = keyFn(s)||"—"; m[k]=(m[k]||0)+1; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  }
  function renderCountTable(pairs){
    if(!pairs.length) return `<div class="empty-state">No data yet.</div>`;
    return `<table class="data"><thead><tr><th>Name</th><th>Shipments</th></tr></thead>
    <tbody>${pairs.map(p=>`<tr><td>${esc(p[0])}</td><td>${p[1]}</td></tr>`).join("")}</tbody></table>`;
  }
  function bindReports(){
    document.getElementById("rep-all").addEventListener("click", ()=>exportCSV(db.shipments, "modelama_shipment_report.csv"));
    document.getElementById("rep-delay").addEventListener("click", ()=>{
      const delayed = db.shipments.filter(s=>currentStageStatus(s)!=="ok");
      exportCSV(delayed, "modelama_delay_report.csv");
    });
  }
  function exportCSV(list, filename){
    const cols = ["shipmentId","invoice","po","style","buyer","supplier","fabric","color","gsm","rolls","qty","priority","currentStage","grnNo"];
    const rows = [cols.join(",")].concat(list.map(s=>cols.map(c=>`"${String(s[c]??"").replace(/"/g,'""')}"`).join(",")));
    const blob = new Blob([rows.join("\n")], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = filename; a.click();
    toast("Exported " + filename);
  }

    return `

  function bindAdmin(){
    const seedBtn = document.getElementById("admin-clear-seed");
    if(seedBtn) seedBtn.addEventListener("click", async ()=>{
      if(!confirm("Remove all sample shipments (INV-2025-0001 to 0005)? Your real shipments are kept.")) return;
      try{
        await apiFetch("/api/shipments/seed", { method:"DELETE" });
        await loadDB();
        toast("Sample data cleared.");
        renderContentOnly();
      }catch(e){ toast("Could not clear sample data — check server connection."); }
    });
    const allBtn = document.getElementById("admin-clear-all");
    if(allBtn) allBtn.addEventListener("click", async ()=>{
      if(!confirm("This permanently erases EVERY shipment, GRN, and test record. Continue?")) return;
      try{
        await apiFetch("/api/shipments/all", { method:"DELETE" });
        await loadDB();
        toast("All data erased.");
        renderContentOnly();
      }catch(e){ toast("Could not erase data — check server connection."); }
    });
  }

  /* ============ INIT ============ */
  async function init(){
    const storedSessionRaw = localStorage.getItem("mm_session");
    if(APP_KEY && storedSessionRaw){
      try{
        session = JSON.parse(storedSessionRaw);
        await loadDB();
        seedIfEmpty();
        await saveDB();
        view = pendingScanShipmentId ? "scan-detail" : "dashboard";
        renderApp();
        return;
      }catch(e){
        // stored passcode/session no longer valid — fall through to manual login
        session = null;
      }
    }
    renderLogin();
  }
  init();

})();
</script>
